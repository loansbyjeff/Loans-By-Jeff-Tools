<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Credit Card APR Calculator</title>
    <style>
        :root {
            --bg-dark: #0F172A;          /* Deep premium slate banking background */
            --panel-bg: #1E293B;         /* Dark grey container panels */
            --accent-green: #10B981;     /* High-contrast neon-emerald branding green */
            --text-main: #F8FAFC;        /* Crisp white for primary headings */
            --text-muted: #94A3B8;       /* Soft grey for descriptive labels */
            --result-dark: #020617;      /* Solid dark obsidian for the output window */
            --error-red: #EF4444;        /* Crimson warning accent */
            --error-bg: #7F1D1D;         /* Deep burgundy warning panel fill */
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-dark);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .responsive-wrapper {
            width: 100%;
            max-width: 450px;
            background: #111827;         /* Sleek smartphone-style container */
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
            margin: 16px;
            box-sizing: border-box;
            border: 1px solid #1F2937;
        }

        .app-container {
            padding: 28px;
            display: flex;
            flex-direction: column;
        }

        /* Corporate Identity Header Styling */
        .branding-header {
            text-align: center;
            margin-bottom: 28px;
        }
        .brand-main {
            font-size: 20px;
            font-weight: 800;
            color: var(--text-main);
            letter-spacing: -0.5px;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }
        .brand-sub {
            font-size: 11px;
            font-weight: bold;
            color: var(--accent-green);
            letter-spacing: 5px;
            margin: 4px 0 0 0;
            text-indent: 5px;
        }

        .app-title {
            font-size: 22px;
            font-weight: bold;
            color: var(--text-main);
            text-align: center;
            margin: 0 0 24px 0;
        }

        /* Modernized Banking Dashboard Modules */
        .input-card {
            background-color: var(--panel-bg);
            border-radius: 16px;
            padding: 18px;
            margin-bottom: 16px;
            border: 1px solid #334155;
        }
        .input-label {
            font-size: 13px;
            color: var(--text-muted);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 6px;
        }
        .input-value {
            font-size: 32px;
            font-weight: 800;
            color: var(--text-main);
            margin-bottom: 8px;
        }

        /* Premium Dark Range Sliders */
        .slider-input {
            -webkit-appearance: none;
            width: 100%;
            height: 6px;
            border-radius: 3px;
            background: #334155;
            outline: none;
            margin: 14px 0;
        }
        .slider-input::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 22px;
            height: 22px;
            border-radius: 50%;
            background: var(--accent-green);
            cursor: pointer;
            box-shadow: 0 0 10px rgba(16, 185, 129, 0.4);
            transition: transform 0.1s, background-color 0.1s;
        }
        .slider-input::-webkit-slider-thumb:hover {
            transform: scale(1.15);
            background: #34D399;
        }
        .slider-footer {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            color: var(--text-muted);
            font-weight: 500;
        }

        /* Digital Statement Output Terminal Box */
        .result-panel {
            background-color: var(--result-dark);
            border-radius: 16px;
            padding: 22px 16px;
            text-align: center;
            margin-top: 12px;
            border: 1px solid #1E293B;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.3);
            transition: all 0.2s ease;
        }
        .result-title {
            font-size: 12px;
            font-weight: bold;
            letter-spacing: 1px;
            color: var(--text-muted);
        }
        .result-apr {
            font-size: 46px;
            font-weight: 900;
            color: var(--accent-green);
            margin: 6px 0;
            text-shadow: 0 0 15px rgba(16, 185, 129, 0.2);
        }
        .result-note {
            font-size: 12px;
            color: var(--text-muted);
        }

        /* Interactive Danger Warning Layout Override */
        .result-panel.error {
            background-color: var(--error-bg);
            border-color: var(--error-red);
            box-shadow: none;
        }
        .result-panel.error .result-title { color: #FECACA; }
        .result-panel.error .result-note { color: #FCA5A5; }
        .result-panel.error .result-apr {
            color: #FFFFFF;
            text-shadow: 0 0 10px rgba(239, 68, 68, 0.4);
        }

        .footnote {
            font-size: 11px;
            color: var(--text-muted);
            text-align: center;
            line-height: 1.5;
            margin-top: 36px;
            border-top: 1px solid #1F2937;
            padding-top: 16px;
        }
    </style>
</head>
<body>

<div class="responsive-wrapper">
    <div class="app-container">
        
        <!-- Premium Corporate Identity -->
        <div class="branding-header">
            <div class="brand-main">
                <span style="font-size: 20px; color: var(--accent-green);">🏛️</span> MUTUAL of OMAHA
            </div>
            <div class="branding-header" style="text-align": center; margin-bottom 28px; padding: 0 8px;">.</div>
                        <img src="https://www.mutualmortgage.com/wp-content/uploads/2024/08/moo_mortgage_horiz_654c.png"
                            alt="Mutual of Omaha Mortgage VII Hills"
                            style="width: 100%; max-width: 563px; height: auto; max-height: 116px; object-fit: contain; display: block; margin: 0 auto;">
        </div>

        <div class="app-title">Credit Card APR Finder</div>

        <!-- Metric Module 1: Total Balance -->
        <div class="input-card">
            <div class="input-label">Total Credit Card Balance</div>
            <div class="input-value" id="balanceDisplay">$5,000</div>
            <input type="range" id="balanceSlider" class="slider-input" min="500" max="20000" step="20" value="5000">
            <div class="slider-footer">
                <span>$500</span>
                <span>$20,000+</span>
            </div>
        </div>

        <!-- Metric Module 2: Minimum Monthly Payment -->
        <div class="input-card">
            <div class="input-label">Minimum Monthly Payment</div>
            <div class="input-value" id="paymentDisplay">$150</div>
            <input type="range" id="paymentSlider" class="slider-input" min="25" max="1000" step="5" value="150">
            <div class="slider-footer">
                <span>$25</span>
                <span>$1,000+</span>
            </div>
        </div>

        <!-- Output Terminal Window -->
        <div class="result-panel" id="resultCard">
            <div class="result-title" id="resultTitle">ESTIMATED ANNUAL APR</div>
            <div class="result-apr" id="aprDisplay">24.00%</div>
            <div class="result-note" id="resultNote">based on the current inputs</div>
        </div>

        <!-- Mandatory Footnote Attribution -->
        <div class="footnote">
            * Created by Jeff Homolak. Assumptions include a 1% balance + interest formula.
        </div>

    </div>
</div>

<script>
    const balanceSlider = document.getElementById('balanceSlider');
    const paymentSlider = document.getElementById('paymentSlider');
    const balanceDisplay = document.getElementById('balanceDisplay');
    const paymentDisplay = document.getElementById('paymentDisplay');
    const resultCard = document.getElementById('resultCard');
    const aprDisplay = document.getElementById('aprDisplay');
    const resultNote = document.getElementById('resultNote');

    function formatCurrency(val) {
        return '$' + parseFloat(val).toFixed(0).replace(/\B(?=(\d{3})+(?!\d))/g, ",");
    }

    function calculateWebAPR() {
        const balance = parseFloat(balanceSlider.value);
        const payment = parseFloat(paymentSlider.value);

        // Core UI Dashboard text updates
        balanceDisplay.innerText = formatCurrency(balance);
        paymentDisplay.innerText = formatCurrency(payment);

        // Reverse-engineered standard ledger arithmetic 
        const principalDeduction = balance * 0.01;
        const interestDifference = payment - principalDeduction;

        if (interestDifference > 0) {
            const calculatedApr = (interestDifference / balance) * 12 * 100;
            aprDisplay.innerText = calculatedApr.toFixed(2) + '%';
            resultNote.innerText = 'based on the current inputs';
            resultCard.classList.remove('error');
        } else {
            aprDisplay.innerText = 'Input Low';
            resultNote.innerText = 'Increase minimum payment';
            resultCard.classList.add('error');
        }
    }

    balanceSlider.addEventListener('input', calculateWebAPR);
    paymentSlider.addEventListener('input', calculateWebAPR);
</script>

</body>
</html>
